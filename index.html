<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPS Partners — deuna</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark:       #1C1C1C;
      --dark2:      #383838;
      --orange:     #FF5500;
      --orange-h:   #E14B00;
      --gray:       #8E8E8E;
      --gray-light: #DCDCDC;
      --bg:         #F6F9FC;
      --white:      #FFFFFF;
      --cream:      #FFFDFA;
      --success:    #0B9595;
      --warning:    #FFB84D;
      --error:      #FF614B;
      --border:     #E8E8E8;
      --radius:     12px;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding-bottom: 64px;
    }

    /* ── HERO ── */
    .hero {
      width: 100%;
      background: var(--cream);
      border-bottom: 1px solid #EDEDEC;
      padding: 32px 24px 48px;
      text-align: center;
      margin-bottom: -28px;
    }
    .hero-top {
      position: relative;
      max-width: 660px; margin: 0 auto 28px;
      display: flex; justify-content: center; align-items: center;
    }
    .logo img { height: 32px; width: auto; display: block; }

    /* lang switcher floats right without pushing logo off-center */
    .lang-switcher {
      position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    }

    /* ── LANGUAGE SWITCHER ── */
    .lang-switcher {
      display: flex; gap: 4px;
      background: #F0F0EE; border-radius: 99px;
      padding: 3px;
    }

    .lang-btn {
      border: none; background: transparent;
      font-family: 'Poppins', sans-serif;
      font-size: 11px; font-weight: 600;
      color: var(--gray);
      padding: 5px 12px; border-radius: 99px;
      cursor: pointer; transition: all .16s;
      letter-spacing: .3px;
    }
    .lang-btn.active {
      background: var(--white);
      color: var(--dark);
      box-shadow: 0 1px 4px rgba(0,0,0,.10);
    }
    .lang-btn:hover:not(.active) { color: var(--dark); }

    .hero h1 {
      color: var(--dark);
      font-size: clamp(20px, 3.5vw, 32px);
      font-weight: 600; line-height: 1.25; margin-bottom: 10px;
    }
    .hero h1 span { color: var(--orange); }
    .hero p {
      color: var(--gray); font-size: 14px; font-weight: 400;
      max-width: 460px; margin: 0 auto; line-height: 1.65;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 2px 24px rgba(28,28,28,.08);
      max-width: 660px; width: calc(100% - 32px);
      padding: 36px 40px 40px;
    }

    /* ── PROGRESS ── */
    .progress-wrap { margin-bottom: 30px; }
    .progress-meta {
      display: flex; justify-content: space-between;
      font-size: 11px; font-weight: 500; color: var(--gray);
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px;
    }
    .progress-track { height: 3px; background: #F0F0F0; border-radius: 99px; overflow: hidden; }
    .progress-bar   { height: 100%; background: var(--orange); border-radius: 99px; transition: width .4s ease; }

    /* ── STEPS ── */
    .step { display: none; }
    .step.active { display: block; animation: up .28s ease; }
    @keyframes up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    /* ── QUESTION ── */
    .q-tag   { display:inline-block; font-size:10px; font-weight:600; color:var(--orange); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:10px; }
    .q-label { font-size:17px; font-weight:600; color:var(--dark); line-height:1.4; margin-bottom:6px; }
    .q-hint  { font-size:12px; font-weight:400; color:var(--gray); margin-bottom:22px; line-height:1.5; }

    /* ── INPUT ── */
    input[type="text"], textarea {
      width:100%; padding:13px 16px;
      border:1.5px solid var(--border); border-radius:var(--radius);
      font-family:'Poppins',sans-serif; font-size:14px; color:var(--dark);
      background:var(--cream); outline:none; transition:border-color .2s; resize:vertical;
    }
    input[type="text"]:focus, textarea:focus { border-color:var(--orange); background:#fff; }
    textarea { min-height:96px; }

    /* ── NPS ── */
    .nps-grid { display:grid; grid-template-columns:repeat(11,1fr); gap:5px; margin-bottom:10px; }
    .nps-btn {
      aspect-ratio:1; border:1.5px solid var(--border); border-radius:8px;
      background:var(--cream); font-family:'Poppins',sans-serif;
      font-size:13px; font-weight:500; color:var(--dark2);
      cursor:pointer; transition:all .16s; display:flex; align-items:center; justify-content:center;
    }
    .nps-btn:hover { border-color:var(--orange); color:var(--orange); transform:translateY(-2px); }
    .nps-btn.sel   { color:#fff; border-color:transparent; transform:translateY(-2px); }
    .nps-btn.sel.detractor { background:var(--error); }
    .nps-btn.sel.passive   { background:var(--warning); color:var(--dark); }
    .nps-btn.sel.promoter  { background:var(--success); }
    .nps-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--gray); }

    /* ── RADIO ── */
    .options { display:flex; flex-direction:column; gap:8px; }
    .opt {
      display:flex; align-items:center; gap:14px; padding:13px 16px;
      border:1.5px solid var(--border); border-radius:var(--radius);
      cursor:pointer; transition:all .16s; background:var(--cream);
    }
    .opt:hover { border-color:var(--orange); background:#fff; }
    .opt.sel   { border-color:var(--orange); background:#FFF3EE; }
    .opt-circle {
      width:17px; height:17px; min-width:17px;
      border:1.5px solid var(--gray-light); border-radius:50%;
      transition:all .16s; display:flex; align-items:center; justify-content:center;
    }
    .opt.sel .opt-circle { border-color:var(--orange); background:var(--orange); }
    .opt.sel .opt-circle::after { content:''; width:5px; height:5px; background:#fff; border-radius:50%; }
    .opt-text { font-size:13px; font-weight:500; color:var(--dark); }

    /* ── CHECKBOX ── */
    .checks { display:flex; flex-direction:column; gap:8px; }
    .chk {
      display:flex; align-items:center; gap:14px; padding:13px 16px;
      border:1.5px solid var(--border); border-radius:var(--radius);
      cursor:pointer; transition:all .16s; background:var(--cream);
    }
    .chk:hover { border-color:var(--orange); background:#fff; }
    .chk.sel   { border-color:var(--orange); background:#FFF3EE; }
    .chk-box {
      width:17px; height:17px; min-width:17px;
      border:1.5px solid var(--gray-light); border-radius:4px;
      transition:all .16s; display:flex; align-items:center; justify-content:center;
    }
    .chk.sel .chk-box { border-color:var(--orange); background:var(--orange); }
    .chk.sel .chk-box::after { content:'✓'; color:#fff; font-size:10px; font-weight:700; line-height:1; }
    .chk-text { font-size:13px; font-weight:500; color:var(--dark); }

    /* ── ERROR ── */
    .err { font-size:11px; color:var(--error); margin-top:8px; display:none; font-weight:500; }
    .err.show { display:block; }

    /* ── NAV ── */
    .nav {
      display:flex; justify-content:space-between; align-items:center;
      margin-top:28px; padding-top:24px; border-top:1px solid #F0F0F0;
    }
    .btn-back {
      background:none; border:1.5px solid var(--border); color:var(--gray);
      padding:11px 22px; border-radius:var(--radius);
      font-family:'Poppins',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all .16s;
    }
    .btn-back:hover { border-color:var(--dark); color:var(--dark); }
    .btn-next {
      background:var(--orange); color:#fff; border:none;
      padding:13px 32px; border-radius:var(--radius);
      font-family:'Poppins',sans-serif; font-size:14px; font-weight:600;
      cursor:pointer; transition:all .16s; margin-left:auto;
    }
    .btn-next:hover:not(:disabled) { background:var(--orange-h); transform:translateY(-1px); box-shadow:0 4px 14px rgba(255,85,0,.28); }
    .btn-next:disabled { background:var(--gray-light); color:var(--gray); cursor:not-allowed; }

    /* ── DIVIDER ── */
    .divider { height:1px; background:#F0F0F0; margin:0 -40px 28px; }

    /* ── THANK YOU ── */
    #thankyou { display:none; text-align:center; padding:16px 0 8px; }
    .ty-icon {
      width:64px; height:64px; background:#E6F7F7; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 20px; font-size:28px; color:var(--success);
    }
    #thankyou h2 { font-size:22px; font-weight:600; color:var(--dark); margin-bottom:10px; }
    #thankyou p  { font-size:13px; color:var(--gray); line-height:1.7; max-width:400px; margin:0 auto 24px; }
    .ty-tag {
      display:inline-block; border:1px solid var(--border); color:var(--gray);
      font-size:11px; font-weight:500; padding:6px 16px; border-radius:99px; letter-spacing:.5px;
    }

    @media (max-width:480px) {
      .card { padding:28px 20px 32px; }
      .nps-btn { font-size:11px; border-radius:6px; }
      .divider { margin:0 -20px 24px; }
      .hero-top { flex-direction:column; gap:16px; align-items:center; }
    }
  </style>
</head>
<body>

<header class="hero">
  <div class="hero-top">
    <div class="logo"><img src="deuna_logo.png" alt="DEUNA" /></div>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="pt" onclick="setLang('pt')">PT</button>
      <button class="lang-btn"        data-lang="es" onclick="setLang('es')">ES</button>
      <button class="lang-btn"        data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <h1 id="hero-title"></h1>
  <p  id="hero-sub"></p>
</header>

<div class="card">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-label"></span>
      <span id="prog-pct">12%</span>
    </div>
    <div class="progress-track"><div class="progress-bar" id="prog-bar" style="width:12%"></div></div>
  </div>

  <form id="form" novalidate>

    <!-- 1 -->
    <div class="step active" data-step="1">
      <div class="divider"></div>
      <div class="q-tag"   id="tag-1"></div>
      <div class="q-label" id="lbl-1"></div>
      <div class="q-hint"  id="hnt-1"></div>
      <input type="text" id="empresa" autocomplete="organization" />
    </div>

    <!-- 2 — NPS -->
    <div class="step" data-step="2">
      <div class="divider"></div>
      <div class="q-tag"   id="tag-2"></div>
      <div class="q-label" id="lbl-2"></div>
      <div class="q-hint"  id="hnt-2"></div>
      <div class="nps-grid" id="nps-grid"></div>
      <div class="nps-labels">
        <span id="nps-low"></span>
        <span id="nps-high"></span>
      </div>
      <div class="err" id="err-nps"></div>
    </div>

    <!-- 3 — Conditional -->
    <div class="step" data-step="3">
      <div class="divider"></div>
      <div class="q-tag"   id="tag-3"></div>
      <div class="q-label" id="cond-label"></div>
      <div class="q-hint"  id="cond-hint"></div>
      <textarea id="cond-resp"></textarea>
    </div>

    <!-- 4 — Support -->
    <div class="step" data-step="4">
      <div class="divider"></div>
      <div class="q-tag"   id="tag-4"></div>
      <div class="q-label" id="lbl-4"></div>
      <div class="q-hint"  id="hnt-4"></div>
      <div class="options" id="opts-suporte"></div>
      <div class="err"     id="err-suporte"></div>
    </div>

    <!-- 5 — Communication -->
    <div class="step" data-step="5">
      <div class="divider"></div>
      <div class="q-tag"   id="tag-5"></div>
      <div class="q-label" id="lbl-5"></div>
      <div class="q-hint"  id="hnt-5"></div>
      <div class="options" id="opts-comunicacao"></div>
      <div class="err"     id="err-comunicacao"></div>
    </div>

    <!-- 6 — Results -->
    <div class="step" data-step="6">
      <div class="divider"></div>
      <div class="q-tag"   id="tag-6"></div>
      <div class="q-label" id="lbl-6"></div>
      <div class="q-hint"  id="hnt-6"></div>
      <div class="options" id="opts-resultados"></div>
      <div class="err"     id="err-resultados"></div>
    </div>

    <!-- 7 — Checkboxes -->
    <div class="step" data-step="7">
      <div class="divider"></div>
      <div class="q-tag"   id="tag-7"></div>
      <div class="q-label" id="lbl-7"></div>
      <div class="q-hint"  id="hnt-7"></div>
      <div class="checks"  id="chks"></div>
    </div>

    <!-- 8 — Open -->
    <div class="step" data-step="8">
      <div class="divider"></div>
      <div class="q-tag"   id="tag-8"></div>
      <div class="q-label" id="lbl-8"></div>
      <div class="q-hint"  id="hnt-8"></div>
      <textarea id="melhoria"></textarea>
    </div>

    <!-- Thank you -->
    <div id="thankyou">
      <div class="ty-icon">✓</div>
      <h2 id="ty-title"></h2>
      <p  id="ty-body"></p>
      <span class="ty-tag">deuna partnerships · 2025</span>
    </div>

    <div class="nav" id="nav">
      <button type="button" class="btn-back" id="btn-back" style="visibility:hidden"></button>
      <button type="button" class="btn-next" id="btn-next"></button>
    </div>
  </form>
</div>

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const TOTAL = 8;
let step  = 1;
let nps   = null;
let lang  = 'pt';

// ── Build NPS buttons (once) ──
const grid = document.getElementById('nps-grid');
for (let i = 0; i <= 10; i++) {
  const b = document.createElement('button');
  b.type = 'button'; b.className = 'nps-btn'; b.dataset.v = i; b.textContent = i;
  b.addEventListener('click', () => {
    nps = i;
    document.querySelectorAll('.nps-btn').forEach(x => x.classList.remove('sel','detractor','passive','promoter'));
    b.classList.add('sel', i <= 6 ? 'detractor' : i <= 8 ? 'passive' : 'promoter');
    document.getElementById('err-nps').classList.remove('show');
    applyConditional(i);
  });
  grid.appendChild(b);
}

// ── Build likert options ──
function buildOptions(containerId, values) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  values.forEach(v => {
    const d = document.createElement('div');
    d.className = 'opt'; d.dataset.v = v;
    d.innerHTML = `<div class="opt-circle"></div><span class="opt-text">${v}</span>`;
    d.addEventListener('click', () => {
      container.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
      d.classList.add('sel');
      const errKey = containerId.replace('opts-','');
      document.getElementById(`err-${errKey}`)?.classList.remove('show');
    });
    container.appendChild(d);
  });
}

// ── Build checkboxes ──
function buildChecks(items) {
  const container = document.getElementById('chks');
  container.innerHTML = '';
  items.forEach(txt => {
    const d = document.createElement('div');
    d.className = 'chk';
    d.innerHTML = `<div class="chk-box"></div><span class="chk-text">${txt}</span>`;
    d.addEventListener('click', () => d.classList.toggle('sel'));
    container.appendChild(d);
  });
}

// ── Apply language ──
function setLang(l) {
  lang = l;
  const t = T[l];

  // Update html lang
  document.documentElement.lang = l === 'pt' ? 'pt-BR' : l === 'es' ? 'es' : 'en';

  // Lang buttons
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));

  // Hero
  document.getElementById('hero-title').innerHTML = t.heroTitle;
  document.getElementById('hero-sub').textContent  = t.heroSub;

  // Q1
  set('tag-1', `${t.question} 1 ${t.of} ${TOTAL}`);
  set('lbl-1', t.q1.lbl); set('hnt-1', t.q1.hnt);
  document.getElementById('empresa').placeholder = t.q1.ph;

  // Q2
  set('tag-2', `${t.question} 2 ${t.of} ${TOTAL}`);
  set('lbl-2', t.q2.lbl); set('hnt-2', t.q2.hnt);
  set('nps-low', t.npsLow); set('nps-high', t.npsHigh);
  set('err-nps', t.errNps);

  // Q3 conditional (re-apply if nps already selected)
  set('tag-3', `${t.question} 3 ${t.of} ${TOTAL}`);
  if (nps !== null) applyConditional(nps);
  document.getElementById('cond-resp').placeholder = t.placeholder;

  // Q4
  set('tag-4', `${t.question} 4 ${t.of} ${TOTAL}`);
  set('lbl-4', t.q4.lbl); set('hnt-4', t.q4.hnt);
  set('err-suporte', t.errOpt);
  buildOptions('opts-suporte', t.likert);

  // Q5
  set('tag-5', `${t.question} 5 ${t.of} ${TOTAL}`);
  set('lbl-5', t.q5.lbl); set('hnt-5', t.q5.hnt);
  set('err-comunicacao', t.errOpt);
  buildOptions('opts-comunicacao', t.likert);

  // Q6
  set('tag-6', `${t.question} 6 ${t.of} ${TOTAL}`);
  set('lbl-6', t.q6.lbl); set('hnt-6', t.q6.hnt);
  set('err-resultados', t.errOpt);
  buildOptions('opts-resultados', t.likert);

  // Q7
  set('tag-7', `${t.question} 7 ${t.of} ${TOTAL}`);
  set('lbl-7', t.q7.lbl); set('hnt-7', t.q7.hnt);
  buildChecks(t.aspects);

  // Q8
  set('tag-8', `${t.question} 8 ${t.of} ${TOTAL}`);
  set('lbl-8', t.q8.lbl); set('hnt-8', t.q8.hnt);
  document.getElementById('melhoria').placeholder = t.q8.ph;

  // Thank you
  set('ty-title', t.tyTitle); set('ty-body', t.tyBody);

  // Nav buttons
  document.getElementById('btn-back').textContent = t.back;
  document.getElementById('btn-next').textContent = step === TOTAL ? t.submit : t.next;

  // Progress
  updateProgress(step);
}

function set(id, txt) {
  const el = document.getElementById(id);
  if (el) el.textContent = txt;
}

function applyConditional(score) {
  const c = T[lang].cond;
  const lbl = score <= 6 ? c.detLbl : score <= 8 ? c.pasLbl : c.proLbl;
  const hnt = score <= 6 ? c.detHnt : score <= 8 ? c.pasHnt : c.proHnt;
  document.getElementById('cond-label').textContent = lbl;
  document.getElementById('cond-hint').textContent  = hnt;
}

// ── Progress ──
function updateProgress(s) {
  const t   = T[lang];
  const pct = Math.round(s / TOTAL * 100);
  document.getElementById('prog-bar').style.width   = pct + '%';
  document.getElementById('prog-pct').textContent   = pct + '%';
  document.getElementById('prog-label').textContent =
    s <= TOTAL ? `${t.question} ${s} ${t.of} ${TOTAL}` : t.done;
}

// ── Validate ──
function validate(s) {
  if (s === 2 && nps === null) { document.getElementById('err-nps').classList.add('show'); return false; }
  if (s === 4 && !document.querySelector('#opts-suporte .opt.sel'))     { document.getElementById('err-suporte').classList.add('show'); return false; }
  if (s === 5 && !document.querySelector('#opts-comunicacao .opt.sel')) { document.getElementById('err-comunicacao').classList.add('show'); return false; }
  if (s === 6 && !document.querySelector('#opts-resultados .opt.sel'))  { document.getElementById('err-resultados').classList.add('show'); return false; }
  return true;
}

// ── Show step ──
function showStep(s) {
  document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
  document.querySelector(`.step[data-step="${s}"]`)?.classList.add('active');
  updateProgress(s);
  document.getElementById('btn-back').style.visibility = s > 1 ? 'visible' : 'hidden';
  document.getElementById('btn-next').textContent = s === TOTAL ? T[lang].submit : T[lang].next;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('btn-next').addEventListener('click', () => {
  if (!validate(step)) return;
  if (step < TOTAL) { step++; showStep(step); }
  else submitForm();
});

document.getElementById('btn-back').addEventListener('click', () => {
  if (step > 1) { step--; showStep(step); }
});

// ── Submit ──
function submitForm() {
  const payload = {
    language:     lang,
    empresa:      document.getElementById('empresa').value.trim(),
    nps,
    cond_resp:    document.getElementById('cond-resp').value.trim(),
    suporte:      document.querySelector('#opts-suporte .opt.sel')?.dataset.v     || '',
    comunicacao:  document.querySelector('#opts-comunicacao .opt.sel')?.dataset.v || '',
    resultados:   document.querySelector('#opts-resultados .opt.sel')?.dataset.v  || '',
    aspectos:     [...document.querySelectorAll('.chk.sel .chk-text')].map(e => e.textContent),
    melhoria:     document.getElementById('melhoria').value.trim(),
    submitted_at: new Date().toISOString(),
  };

  const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/deuna.com/s/AKfycbyjOmWR715wh6oSi5aDtIQcp7o-5uCSvC3DLBKSVQU2J-TuEX3CVRSaw2Rz8OrHKgE7Ig/exec';
  fetch(APPS_SCRIPT_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  }).catch(() => {});

  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('thankyou').style.display = 'block';
  document.getElementById('nav').style.display = 'none';
  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('prog-pct').textContent = '100%';
  document.getElementById('prog-label').textContent = T[lang].done;
}

// ── Enter key ──
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.activeElement.tagName === 'TEXTAREA') return;
  e.preventDefault();
  if (document.getElementById('nav').style.display === 'none') return;
  document.getElementById('btn-next').click();
});

// ── Init ──
setLang('pt');
showStep(1);
</script>
</body>
</html>
